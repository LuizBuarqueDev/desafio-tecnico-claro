services:

  postgres:
    image: postgres:17
    container_name: claro-postgres
    environment:
      POSTGRES_DB: pedidos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:
    build: .
    container_name: claro-backend

    depends_on:
      - postgres

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pedidos
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres


  frontend:
    build: ../pedidos_frontend
    container_name: claro-frontend

    depends_on:
      - backend

    ports:
      - "4200:80"


  prometheus:
    image: prom/prometheus
    container_name: claro-prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - backend


  grafana:
    image: grafana/grafana
    container_name: claro-grafana

    ports:
      - "3000:3000"

    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/provisioning:/etc/grafana/provisioning

    depends_on:
      - prometheus


volumes:
  postgres_data:
  grafana_data: