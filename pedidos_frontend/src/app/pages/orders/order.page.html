<div class="main-container">
  <div class="page-header">
    <div>
      <h1>Pedidos</h1>
      <p>Gerencie todos os pedidos cadastrados</p>
    </div>

    <button
      mat-raised-button
      color="primary"
      routerLink="/order-create"
      [disabled]="orders().length >= 5"
    >
      <mat-icon>add</mat-icon>
      Novo Pedido
    </button>
  </div>

  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Pesquisar cliente</mat-label>

    <input matInput #search placeholder="Digite o nome..." (keyup)="onSearch(search.value)" />

    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <app-orders-grid
    [orders]="orders()"
    (statusChange)="onStatusChange($event)"
    (deleteOrder)="onDelete($event)"
  />

  <mat-paginator
    [length]="totalElements()"
    [pageIndex]="pageIndex()"
    [pageSize]="pageSize()"
    [pageSizeOptions]="[5, 10, 20]"
    (page)="onPageChange($event)"
  >
  </mat-paginator>
</div>
