<div class="main-container">
  <div class="page-header">
    <div>
      <h1>Pedidos</h1>
      <p>Gerencie todos os pedidos cadastrados</p>
    </div>

    <button
      mat-raised-button
      color="primary"
      routerLink="/order-create"
      [disabled]="orders().length >= 5"
    >
      <mat-icon>add</mat-icon>
      Novo Pedido
    </button>
  </div>

  <app-orders-grid
    [orders]="orders()"
    (statusChange)="onStatusChange($event)"
    (deleteOrder)="onDelete($event)"
  />
</div>
